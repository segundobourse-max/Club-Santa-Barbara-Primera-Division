<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo Oficial - Estadísticas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col justify-between">

    <div id="pantallaBienvenida" class="fixed inset-0 z-50 flex flex-col justify-center items-center p-4 bg-gradient-to-br from-gray-950 via-slate-900 to-emerald-950">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-emerald-500/10 via-transparent to-transparent pointer-events-none"></div>
        
        <div class="text-center mb-12 max-w-sm relative z-10">
            <span class="text-4xl">🏆</span>
            <h1 class="text-3xl font-black tracking-wider text-white mt-3">CLUB MANAGER</h1>
            <p class="text-sm text-emerald-400 font-medium tracking-wide mt-1 uppercase">Selecciona una categoría para ingresar</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full max-w-xl relative z-10">
            <button onclick="seleccionarCategoria('A')" class="group bg-gray-900/80 backdrop-blur border border-emerald-500/30 hover:border-emerald-400 p-8 rounded-3xl shadow-2xl transition-all duration-300 text-center flex flex-col items-center justify-center gap-4 active:scale-95">
                <div class="w-16 h-16 rounded-2xl bg-emerald-500/10 flex items-center justify-center text-3xl group-hover:bg-emerald-500 group-hover:text-gray-950 transition-all duration-300 shadow-inner">
                    🅰️
                </div>
                <div>
                    <h2 class="text-xl font-black text-white group-hover:text-emerald-400 transition-colors">PRIMERA A</h2>
                    <p class="text-xs text-gray-400 mt-1">Estadísticas, tablas y fixtures del torneo superior.</p>
                </div>
            </button>

            <button onclick="seleccionarCategoria('B')" class="group bg-gray-900/80 backdrop-blur border border-blue-500/30 hover:border-blue-400 p-8 rounded-3xl shadow-2xl transition-all duration-300 text-center flex flex-col items-center justify-center gap-4 active:scale-95">
                <div class="w-16 h-16 rounded-2xl bg-blue-500/10 flex items-center justify-center text-3xl group-hover:bg-blue-500 group-hover:text-gray-950 transition-all duration-300 shadow-inner">
                    🅱️
                </div>
                <div>
                    <h2 class="text-xl font-black text-white group-hover:text-blue-400 transition-colors">PRIMERA B</h2>
                    <p class="text-xs text-gray-400 mt-1">Seguimiento completo del torneo de ascenso.</p>
                </div>
            </button>
        </div>
    </div>


    <div id="pantallaContenido" class="hidden flex-1 flex flex-col">
        <header class="bg-gray-900 border-b border-gray-800 p-4 sticky top-0 z-40 shadow-lg">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <button onclick="volverAlMenu()" class="text-xs font-bold text-gray-400 hover:text-white bg-gray-950 px-3 py-2 rounded-xl border border-gray-800 transition-all flex items-center gap-1">
                    ← Volver
                </button>
                
                <div id="badgeCategoria" class="px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase">
                    Cargando...
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 sm:p-6 space-y-6 w-full flex-1">
            <div class="border-b border-gray-800 pb-2">
                <h2 id="tituloSeccion" class="text-2xl font-black text-white tracking-tight">
                    Plantel de Jugadores
                </h2>
                <p class="text-sm text-gray-400 mt-1">Estadísticas individuales cargadas en tiempo real.</p>
            </div>

            <div id="contenedorTarjetas" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                </div>
        </main>
    </div>

    <script>
        // ID de tu Google Sheet
        const SPREADSHEET_ID = "153DVd4H-hTuYitiYk3M2YMkFGwODq0Ul8gKZWRQUSP0";
        
        // Pestañas de Excel asignadas a cada categoría
        const GIDS = {
            A: "964524187", // Tu pestaña de Primera A
            B: "181745424"  // Pestaña de Primera B (Podemos cambiarla después cuando la crees)
        };

        let categoriaSeleccionada = '';

        // Función que se activa al hacer clic en Primera A o B
        function seleccionarCategoria(letra) {
            categoriaSeleccionada = letra;
            
            const bienvenida = document.getElementById('pantallaBienvenida');
            const contenido = document.getElementById('pantallaContenido');
            const badge = document.getElementById('badgeCategoria');

            // Configurar el estilo del indicador según la categoría
            if (letra === 'A') {
                badge.innerText = "🏆 Primera A";
                badge.className = "px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
            } else {
                badge.innerText = "⚡ Primera B";
                badge.className = "px-4 py-1.5 rounded-full text-xs font-black tracking-widest uppercase bg-blue-500/10 text-blue-400 border border-blue-500/20";
            }

            // Transición visual entre pantallas
            bienvenida.classList.add('hidden');
            contenido.classList.remove('hidden');

            cargarDatosElegidos();
        }

        // Función para regresar a la pantalla de bienvenida
        function volverAlMenu() {
            document.getElementById('pantallaBienvenida').classList.remove('hidden');
            document.getElementById('pantallaContenido').classList.add('hidden');
        }

        async function cargarDatosElegidos() {
            const contenedor = document.getElementById('contenedorTarjetas');
            contenedor.innerHTML = `
                <div class="text-center py-12 col-span-full">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-emerald-500 border-t-transparent mb-4"></div>
                    <p class="text-gray-400 text-sm">Actualizando datos oficiales...</p>
                </div>`;

            try {
                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GIDS[categoriaSeleccionada]}`;
                const respuesta = await fetch(url);
                const textoRaw = await respuesta.text();
                
                const jsonText = textoRaw.substring(textoRaw.indexOf("{"), textoRaw.lastIndexOf("}") + 1);
                const datosGoogle = JSON.parse(jsonText);
                
                const filas = datosGoogle.table.rows;
                let htmlCards = "";

                // Empezamos a leer el Excel desde la fila index 2 para saltar encabezados de adorno
                for (let i = 2; i < filas.length; i++) {
                    const celdas = filas[i].c;
                    
                    if (!celdas || !celdas[1] || !celdas[1].v) continue;

                    const nombre = celdas[1].v;
                    if (nombre.toLowerCase().includes("total") || nombre.toLowerCase().includes("promedio")) continue;

                    const puesto = celdas[2] && celdas[2].v ? celdas[2].v : "Jugador";
                    const pj = celdas[3] && celdas[3].v !== null ? celdas[3].v : "0";
                    const goles = celdas[4] && celdas[4].v !== null ? celdas[4].v : "0";
                    const asistencias = celdas[5] && celdas[5].v !== null ? celdas[5].v : "0";

                    htmlCards += `
                        <div class="bg-gray-900 rounded-2xl p-5 border border-gray-800 shadow-xl flex flex-col justify-between group hover:border-emerald-500/20 transition-all duration-300">
                            <div>
                                <span class="text-[10px] font-black uppercase tracking-widest text-emerald-400 bg-emerald-500/10 px-2.5 py-1 rounded-md">
                                    ${puesto}
                                </span>
                                <h3 class="text-lg font-bold text-white mt-3 group-hover:text-emerald-400 transition-colors">${nombre}</h3>
                            </div>
                            
                            <div class="grid grid-cols-3 gap-2 mt-6 text-center border-t border-gray-800/60 pt-4">
                                <div>
                                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Partidos</p>
                                    <p class="text-base font-black text-gray-200 mt-0.5">${pj}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Goles</p>
                                    <p class="text-base font-black text-emerald-400 mt-0.5">${goles}</p>
                                </div>
                                <div>
                                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Asist.</p>
                                    <p class="text-base font-black text-blue-400 mt-0.5">${asistencias}</p>
                                </div>
                            </div>
                        </div>
                    `;
                }

                contenedor.innerHTML = htmlCards;

            } catch (error) {
                console.error(error);
                contenedor.innerHTML = `
                    <div class="text-center py-12 col-span-full bg-red-950/20 border border-red-900/50 rounded-2xl p-6">
                        <p class="text-red-400 font-bold text-base">Error de sincronización</p>
                        <p class="text-gray-400 text-xs mt-1">No se pudieron leer los datos de esta categoría.</p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
